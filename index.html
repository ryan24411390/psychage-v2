<head>
  <meta charset="UTF-8" />

  <meta name="theme-color" content="#1A9B8C" />
  <link rel="canonical" href="https://psychage.com/" />

  <!-- Primary Meta Tags -->
  <title>Psychage | Understand Your Mind</title>
  <link rel="icon" type="image/png" href="/images/logo.png" />
  <meta name="title" content="Psychage | Understand Your Mind">

    content="The first adaptive operating system for mental health. Free articles, videos, tools, and AI support designed to bridge the gap between clinical science and daily life.">

  <!-- Content Security Policy -->

  <!-- Open Graph / Facebook -->

  <meta property="og:url" content="https://psychage.com/">
  <meta property="og:title" content="Psychage | Understand Your Mind">

    content="Explore your mental wellness with evidence-informed tools, educational articles, and AI-powered support designed to bridge the gap between science and daily life.">

  <meta property="og:site_name" content="Psychage">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="https://psychage.com/">
  <meta property="twitter:title" content="Psychage | Understand Your Mind">
  <meta property="twitter:description" content="Explore your mental wellness with evidence-informed tools and AI-powered support.">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap"
    rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #fafaf9;
      color: #000000;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    html {
      scroll-behavior: smooth;
    }

    .sr-only:focus {
      clip: auto !important;
      clip-path: none !important;
      width: auto !important;
      height: auto !important;
      margin: 0 !important;
    }

    ::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    ::-webkit-scrollbar-track {
      background: #fafaf9;
    }

    ::-webkit-scrollbar-thumb {
      background: #2dd4bf;
      border-radius: 5px;
      border: 2px solid #fafaf9;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #1A9B8C;
    }

    html.dark body {
      background-color: #1A1A2E;
      color: #ffffff;
    }

    html.dark ::-webkit-scrollbar-track {
      background: #1A1A2E;
    }

    html.dark ::-webkit-scrollbar-thumb {
      background: #20B8A6;
      border: 2px solid #1A1A2E;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/index.tsx"></script>
</body>

</html>
