<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="robots" content="noindex, nofollow" />

  <title>Psychage Admin</title>
  <link rel="icon" type="image/png" href="/images/logo.png" />

  <!-- Content Security Policy (admin-specific: no Gemini API, no Unsplash) -->
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' https://cdn.sanity.io data: blob:; connect-src 'self' https://*.supabase.co https://*.sanity.io https://cdn.sanity.io;">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background-color: #f8fafc;
      color: #0f172a;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    html.dark body {
      background-color: #020617;
      color: #f8fafc;
    }

    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #f1f5f9;
    }

    ::-webkit-scrollbar-thumb {
      background: #94a3b8;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #64748b;
    }

    html.dark ::-webkit-scrollbar-track {
      background: #0f172a;
    }

    html.dark ::-webkit-scrollbar-thumb {
      background: #475569;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/admin-index.tsx"></script>
</body>

</html>
